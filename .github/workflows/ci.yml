name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: web-ext lint
        run: npx --yes web-ext lint --source-dir . --self-hosted
          --ignore-files ".github/**" "docs/**" "*.md" "LICENSE"
